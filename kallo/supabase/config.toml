
[functions.telnyx-webhook]
enabled = true
verify_jwt = false
import_map = "./functions/telnyx-webhook/deno.json"
entrypoint = "./functions/telnyx-webhook/index.ts"

[functions.telnyx-call]
enabled = true
verify_jwt = false
entrypoint = "./functions/telnyx-call/index.ts"

[functions.telnyx-hangup]
enabled = true
verify_jwt = true
entrypoint = "./functions/telnyx-hangup/index.ts"

[functions.telnyx-search-numbers]
enabled = true
verify_jwt = false
entrypoint = "./functions/telnyx-search-numbers/index.ts"

[functions.telnyx-list-numbers]
enabled = true
verify_jwt = false
entrypoint = "./functions/telnyx-list-numbers/index.ts"

[functions.telnyx-push-agent]
enabled = true
verify_jwt = true
import_map = "./functions/telnyx-push-agent/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/telnyx-push-agent/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/telnyx-push-agent/*.html" ]
